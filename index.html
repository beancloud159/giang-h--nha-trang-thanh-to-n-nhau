    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #001a33 url('banner.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; overflow: hidden;
        }

        .container {
            display: flex; justify-content: center; align-items: center;
            height: 100%; width: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        /* KHUNG WRAPPER: Đã thu nhỏ max-width xuống 360px cho gọn */
        .promo-card-wrapper {
            position: relative;
            width: 88%; 
            max-width: 360px; 
            border-radius: 25px;
            padding: 4px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            animation: slideIn 0.6s ease-out;
        }

        /* Hiệu ứng tia sáng Neon đa sắc */
        .promo-card-wrapper::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, #ffcc00 0%, #00ffcc 25%, #ff00ff 50%, #ff4757 75%, #ffcc00 100%);
            animation: rotateGlow 3s linear infinite;
            z-index: 1;
        }

        /* NỘI DUNG CHÍNH (Nền xanh đen mờ) */
        .promo-card-content {
            position: relative;
            background: rgba(0, 15, 30, 0.95);
            border-radius: 22px;
            padding: 20px 25px; 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            z-index: 2;
        }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 {
            color: #ffcc00; font-size: 24px; margin: 0;
            text-transform: uppercase; font-weight: 900;
            text-shadow: 0 2px 8px rgba(255, 204, 0, 0.7);
        }

        .sub-title {
            color: #00ffcc; font-size: 16px; font-weight: bold;
            display: block; margin: 5px 0 15px 0;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.7; } }

        .description { font-size: 13px; line-height: 1.5; color: #f0f0f0; margin-bottom: 15px; }

        .highlight-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px; padding: 12px; margin-bottom: 15px;
            border-left: 4px solid #ffcc00; text-align: left;
        }

        .highlight-box ul { margin: 0; padding-left: 5px; list-style: none; }
        .highlight-box li { margin: 6px 0; font-size: 12px; }

        .btn-fb {
            background: linear-gradient(135deg, #1877f2, #0056b3);
            color: white; text-decoration: none;
            padding: 12px 20px; border-radius: 50px;
            font-size: 15px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #fff; cursor: pointer;
            width: 100%; box-sizing: border-box;
            animation: pulse-fb 1.5s infinite ease-in-out; 
        }

        @keyframes pulse-fb {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-fb img { width: 20px; margin-right: 8px; }
        .footer-note { font-size: 10px; color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
